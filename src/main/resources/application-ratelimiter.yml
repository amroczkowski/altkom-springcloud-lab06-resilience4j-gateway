server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: project-service
              uri: lb://project-service
              predicates:
                - Path=/project/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10 # liczba dodawanych tokenów w każdej sekundzie
                    redis-rate-limiter.burstCapacity: 20 # max tokenów do wykorzystania
                    redis-rate-limiter.requestedTokens: 1 # tokeny w ramach requesta
            - id: employee-service
              uri: lb://employee-service
              predicates:
                - Path=/employee/**
  data:
    redis:
      connect-timeout: 30s
      host: localhost
      port: 6379
      timeout: 1s
